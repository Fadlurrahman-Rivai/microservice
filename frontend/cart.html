<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPlace – Keranjang</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-shop-window me-2"></i>MarketPlace</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Beranda</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-grid me-1"></i>Produk</a></li>
        <li class="nav-item">
          <a class="nav-link" href="cart.html">
            <i class="bi bi-cart3 me-1"></i>Keranjang
            <span class="cart-badge" style="display:none">0</span>
          </a>
        </li>
        <li class="nav-item"><a class="nav-link" href="transactions.html"><i class="bi bi-receipt me-1"></i>Transaksi</a></li>
        <li class="nav-item"><a class="nav-link" href="admin.html"><i class="bi bi-gear me-1"></i>Admin</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container">

    <div id="alert-container"></div>

    <h1 class="section-title">Keranjang Belanja</h1>

    <div class="row g-4">
      <!-- Cart Items -->
      <div class="col-lg-8">
        <div id="cart-container">
          <div class="d-flex justify-content-center py-5">
            <div class="spinner-border text-primary me-3" role="status"></div>
            <span class="text-muted align-self-center">Memuat keranjang...</span>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-4">
        <div class="card order-summary-card p-4">
          <h5 class="fw-bold mb-3"><i class="bi bi-receipt me-2"></i>Ringkasan Pesanan</h5>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Jumlah Item</span>
            <span id="summary-count" class="fw-semibold">0</span>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <span class="text-muted">Total Harga</span>
            <span id="summary-total" class="fw-bold text-price fs-5">Rp 0</span>
          </div>
          <hr>
          <a href="checkout.html" id="btn-checkout"
             class="btn btn-primary btn-lg w-100 disabled">
            <i class="bi bi-credit-card me-2"></i>Checkout
          </a>
          <a href="products.html" class="btn btn-outline-secondary w-100 mt-2">
            <i class="bi bi-arrow-left me-2"></i>Lanjut Belanja
          </a>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="container text-center">
    <p class="mb-0 small">&copy; 2024 MarketPlace Microservices</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script>
'use strict';

let cartData = null;

async function loadCart() {
  const container = document.getElementById('cart-container');
  try {
    const data = await apiCall(`${API.CART}/cart?user_id=${USER_ID}`);
    cartData = data.data;
    renderCart(cartData);
    updateSummary(cartData);
    updateCartBadge(cartData.item_count);
  } catch (e) {
    container.innerHTML = `<div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle me-2"></i>Gagal memuat keranjang: ${e.message}
    </div>`;
  }
}

function renderCart(data) {
  const container = document.getElementById('cart-container');

  if (!data.items.length) {
    container.innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-cart-x display-3 text-muted"></i>
        <h4 class="mt-3 text-muted">Keranjang masih kosong</h4>
        <p class="text-muted">Yuk, mulai belanja dan tambahkan produk favoritmu!</p>
        <a href="products.html" class="btn btn-primary mt-2">
          <i class="bi bi-bag me-2"></i>Mulai Belanja
        </a>
      </div>`;
    return;
  }

  let html = `<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-3" style="width:80px">Foto</th>
              <th>Produk</th>
              <th class="text-center" style="width:140px">Jumlah</th>
              <th class="text-end" style="width:130px">Subtotal</th>
              <th class="text-center" style="width:60px"></th>
            </tr>
          </thead>
          <tbody>`;

  data.items.forEach(item => {
    const img = item.gambar || `https://via.placeholder.com/100x100?text=${encodeURIComponent(item.nama_produk)}`;
    html += `
      <tr data-id-detail="${item.id_detail}">
        <td class="ps-3">
          <img src="${img}" class="cart-item-img" alt="${item.nama_produk}"
               onerror="this.src='https://via.placeholder.com/100x100?text=?'">
        </td>
        <td>
          <div class="fw-semibold">${item.nama_produk}</div>
          <div class="text-muted small">${formatCurrency(item.harga)} / pcs</div>
        </td>
        <td class="text-center">
          <div class="d-flex align-items-center justify-content-center gap-1">
            <button class="btn btn-outline-secondary qty-btn btn-qty-minus"
                    data-id="${item.id_detail}" data-harga="${item.harga}">
              <i class="bi bi-dash"></i>
            </button>
            <input type="number" class="form-control qty-input qty-field"
                   value="${item.jumlah}" min="1" max="99"
                   data-id="${item.id_detail}" data-harga="${item.harga}">
            <button class="btn btn-outline-secondary qty-btn btn-qty-plus"
                    data-id="${item.id_detail}" data-harga="${item.harga}">
              <i class="bi bi-plus"></i>
            </button>
          </div>
        </td>
        <td class="text-end fw-bold text-price">${formatCurrency(item.subtotal)}</td>
        <td class="text-center">
          <button class="btn btn-outline-danger btn-sm btn-remove" data-id="${item.id_detail}"
                  title="Hapus">
            <i class="bi bi-trash3"></i>
          </button>
        </td>
      </tr>`;
  });

  html += `</tbody></table></div>
    <div class="d-flex justify-content-end p-3">
      <button class="btn btn-outline-danger btn-sm" id="btn-clear-cart">
        <i class="bi bi-trash me-1"></i>Kosongkan Keranjang
      </button>
    </div>
  </div></div>`;

  container.innerHTML = html;
  attachCartEvents();
}

function updateSummary(data) {
  document.getElementById('summary-count').textContent = data.item_count + ' item';
  document.getElementById('summary-total').textContent  = formatCurrency(data.total);
  const btnCO = document.getElementById('btn-checkout');
  if (data.item_count > 0) btnCO.classList.remove('disabled');
  else btnCO.classList.add('disabled');
}

function attachCartEvents() {
  // Quantity minus
  document.querySelectorAll('.btn-qty-minus').forEach(btn => btn.addEventListener('click', async () => {
    const input = document.querySelector(`.qty-field[data-id="${btn.dataset.id}"]`);
    const newQty = parseInt(input.value) - 1;
    if (newQty < 1) {
      await removeItem(btn.dataset.id);
    } else {
      await updateItem(btn.dataset.id, newQty);
    }
  }));

  // Quantity plus
  document.querySelectorAll('.btn-qty-plus').forEach(btn => btn.addEventListener('click', async () => {
    const input = document.querySelector(`.qty-field[data-id="${btn.dataset.id}"]`);
    await updateItem(btn.dataset.id, parseInt(input.value) + 1);
  }));

  // Direct input change
  document.querySelectorAll('.qty-field').forEach(input => {
    let timer;
    input.addEventListener('change', () => {
      clearTimeout(timer);
      const qty = parseInt(input.value);
      timer = setTimeout(() => {
        if (qty < 1) removeItem(input.dataset.id);
        else updateItem(input.dataset.id, qty);
      }, 500);
    });
  });

  // Remove single item
  document.querySelectorAll('.btn-remove').forEach(btn => btn.addEventListener('click', () =>
    removeItem(btn.dataset.id)
  ));

  // Clear all
  document.getElementById('btn-clear-cart')?.addEventListener('click', async () => {
    if (!confirm('Yakin ingin mengosongkan keranjang?')) return;
    try {
      await apiCall(`${API.CART}/cart/clear`, {
        method: 'DELETE',
        body: JSON.stringify({ user_id: USER_ID }),
      });
      showAlert('Keranjang berhasil dikosongkan.', 'info');
      loadCart();
    } catch (e) {
      showAlert('Gagal mengosongkan keranjang: ' + e.message, 'danger');
    }
  });
}

async function updateItem(idDetail, qty) {
  try {
    await apiCall(`${API.CART}/cart/update`, {
      method: 'PUT',
      body: JSON.stringify({ id_detail: parseInt(idDetail), jumlah: qty }),
    });
    loadCart();
  } catch (e) {
    showAlert('Gagal memperbarui keranjang: ' + e.message, 'danger');
  }
}

async function removeItem(idDetail) {
  try {
    await apiCall(`${API.CART}/cart/remove`, {
      method: 'DELETE',
      body: JSON.stringify({ id_detail: parseInt(idDetail) }),
    });
    loadCart();
  } catch (e) {
    showAlert('Gagal menghapus item: ' + e.message, 'danger');
  }
}

loadCart();
</script>
</body>
</html>
