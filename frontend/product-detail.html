<script>
'use strict';

// ── SSE – stok real-time ──────────────────────────────────────────
let stockSSE         = null;
let currentStockValue = null;

function startStockSSE(pid) {
  if (!window.EventSource) return;
  if (stockSSE) { stockSSE.close(); stockSSE = null; }

  stockSSE = new EventSource(`${API.INVENTORY}/stock/events?products=${pid}`);

  // Saat koneksi pertama dibuka, server mengirim seluruh stok ('init').
  // Gunakan hanya untuk sinkronisasi awal tanpa efek visual.
  stockSSE.addEventListener('init', (e) => {
    const rows = JSON.parse(e.data);
    const row  = rows.find(r => String(r.id_produk) === String(pid));
    if (row !== undefined) {
      currentStockValue = parseInt(row.jumlah);
    }
  });

  // Setiap kali stok berubah, server mendorong event ini.
  stockSSE.addEventListener('stock_update', (e) => {
    const row = JSON.parse(e.data);
    if (String(row.id_produk) !== String(pid)) return;
    const newVal = parseInt(row.jumlah);
    if (newVal !== currentStockValue) {
      currentStockValue = newVal;
      applyStockUpdate(newVal);
    }
  });

  stockSSE.onerror = () => { /* EventSource reconnects otomatis */ };
}

function applyStockUpdate(jumlah) {
  const statusEl = document.getElementById('stock-status');
  const qtyInput = document.getElementById('qty-input');
  const addBtn   = document.getElementById('btn-add-cart');
  if (!statusEl) return;

  let badgeHTML;
  if (jumlah === 0) {
    badgeHTML = '<span class="stock-empty"><i class="bi bi-x-circle me-1"></i>Stok Habis</span>';
  } else if (jumlah <= 5) {
    badgeHTML = `<span class="stock-low"><i class="bi bi-exclamation-triangle me-1"></i>Stok Terbatas: ${jumlah} tersisa</span>`;
  } else {
    badgeHTML = `<span class="stock-ok"><i class="bi bi-check-circle me-1"></i>Stok Tersedia: ${jumlah} unit</span>`;
  }

  // Tampilkan badge "Diperbarui!" + efek flash, lalu bersihkan setelah 2,5 detik
  statusEl.innerHTML = badgeHTML
    + ' <span class="badge bg-warning text-dark ms-1" style="font-size:.7rem">&#8593; Diperbarui!</span>';
  statusEl.classList.add('stock-flash');
  setTimeout(() => {
    statusEl.innerHTML = badgeHTML;
    statusEl.classList.remove('stock-flash');
  }, 2500);

  if (qtyInput) {
    qtyInput.max = jumlah || 99;
    if (parseInt(qtyInput.value) > jumlah && jumlah > 0) {
      qtyInput.value = jumlah;
    }
  }
  if (addBtn) {
    addBtn.disabled = jumlah === 0;
  }
}

window.addEventListener('beforeunload', () => {
  if (stockSSE) stockSSE.close();
});
</script>
<script>
'use strict';

const productId = new URLSearchParams(location.search).get('id');

if (!productId || isNaN(productId)) {
  document.getElementById('product-detail-container').innerHTML =
    `<div class="alert alert-warning"><i class="bi bi-exclamation-triangle me-2"></i>
     ID produk tidak valid. <a href="products.html">Kembali ke daftar produk</a></div>`;
}

async function loadProductDetail() {
  const container = document.getElementById('product-detail-container');
  try {
    // Load product & stock in parallel
    const [prodData, stockData] = await Promise.allSettled([
      apiCall(`${API.CATALOG}/products/${productId}`),
      apiCall(`${API.INVENTORY}/stock/${productId}`),
    ]);

    if (prodData.status === 'rejected') throw new Error(prodData.reason.message);

    const p     = prodData.value.data;
    const stok  = stockData.status === 'fulfilled' ? (stockData.value.data?.jumlah ?? 0) : null;
    const img   = p.gambar || `https://via.placeholder.com/600x450?text=${encodeURIComponent(p.nama_produk)}`;

    // Update breadcrumb
    document.getElementById('bc-name').textContent = p.nama_produk;
    document.title = `${p.nama_produk} – MarketPlace`;

    // Stock badge
    let stockHTML = '';
    if (stok === null) {
      stockHTML = '<span class="text-muted"><i class="bi bi-dash me-1"></i>Info stok tidak tersedia</span>';
    } else if (stok === 0) {
      stockHTML = '<span class="stock-empty"><i class="bi bi-x-circle me-1"></i>Stok Habis</span>';
    } else if (stok <= 5) {
      stockHTML = `<span class="stock-low"><i class="bi bi-exclamation-triangle me-1"></i>Stok Terbatas: ${stok} tersisa</span>`;
    } else {
      stockHTML = `<span class="stock-ok"><i class="bi bi-check-circle me-1"></i>Stok Tersedia: ${stok} unit</span>`;
    }

    const addBtnDisabled = stok === 0 ? 'disabled' : '';

    container.innerHTML = `
      <div class="row g-4">
        <div class="col-md-5">
          <div class="rounded-3 overflow-hidden shadow-sm">
            <img src="${img}" class="img-fluid w-100" style="max-height:420px;object-fit:cover"
                 alt="${p.nama_produk}"
                 onerror="this.src='https://via.placeholder.com/600x450?text=No+Image'">
          </div>
        </div>
        <div class="col-md-7">
          <span class="badge bg-secondary mb-2">${p.nama_kategori || 'Umum'}</span>
          <h1 class="h3 fw-bold mb-2">${p.nama_produk}</h1>
          <div class="price-tag fs-2 mb-3">${formatCurrency(p.harga)}</div>

          <div class="mb-3" id="stock-status">${stockHTML}</div>

          <div class="mb-4">
            <h6 class="fw-semibold">Deskripsi Produk</h6>
            <p class="text-muted lh-lg">${p.deskripsi || 'Tidak ada deskripsi.'}</p>
          </div>

          <div class="d-flex align-items-center gap-3 mb-4">
            <label class="fw-semibold">Jumlah:</label>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-outline-secondary qty-btn" id="qty-minus">
                <i class="bi bi-dash"></i>
              </button>
              <input type="number" id="qty-input" class="form-control qty-input"
                     value="1" min="1" max="${stok || 99}">
              <button class="btn btn-outline-secondary qty-btn" id="qty-plus">
                <i class="bi bi-plus"></i>
              </button>
            </div>
          </div>

          <div class="d-flex gap-3 flex-wrap">
            <button id="btn-add-cart" class="btn btn-primary btn-lg px-4 ${addBtnDisabled}"
              data-id="${p.id_produk}" data-nama="${p.nama_produk}"
              data-harga="${p.harga}" data-gambar="${img}">
              <i class="bi bi-cart-plus me-2"></i>Tambah ke Keranjang
            </button>
            <a href="cart.html" class="btn btn-outline-secondary btn-lg">
              <i class="bi bi-cart3 me-2"></i>Lihat Keranjang
            </a>
          </div>

          <hr class="my-4">
          <dl class="row text-muted small">
            <dt class="col-sm-4">ID Produk</dt>
            <dd class="col-sm-8">#${p.id_produk}</dd>
            <dt class="col-sm-4">Kategori</dt>
            <dd class="col-sm-8">${p.nama_kategori || '-'}</dd>
          </dl>
        </div>
      </div>`;

    // Mulai SSE untuk pembaruan stok real-time
    currentStockValue = stok ?? 0;
    startStockSSE(productId);

    // Qty controls
    const qtyInput = document.getElementById('qty-input');
    const maxQty   = stok || 99;

    document.getElementById('qty-minus').addEventListener('click', () => {
      if (qtyInput.value > 1) qtyInput.value--;
    });
    document.getElementById('qty-plus').addEventListener('click', () => {
      if (parseInt(qtyInput.value) < maxQty) qtyInput.value++;
    });
    qtyInput.addEventListener('change', () => {
      let v = parseInt(qtyInput.value);
      if (isNaN(v) || v < 1) v = 1;
      if (v > maxQty) v = maxQty;
      qtyInput.value = v;
    });

    // Add to cart
    document.getElementById('btn-add-cart').addEventListener('click', async function() {
      const qty = parseInt(qtyInput.value);
      this.disabled = true;
      const orig = this.innerHTML;
      this.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menambahkan...';
      try {
        await apiCall(`${API.CART}/cart/add`, {
          method: 'POST',
          body: JSON.stringify({
            user_id: USER_ID,
            id_produk: p.id_produk,
            nama_produk: p.nama_produk,
            harga: p.harga,
            jumlah: qty,
            gambar: img,
          }),
        });
        this.innerHTML = '<i class="bi bi-check-lg me-2"></i>Ditambahkan!';
        this.classList.replace('btn-primary', 'btn-success');
        showAlert(`<i class="bi bi-check-circle me-1"></i><b>${p.nama_produk}</b> (${qty}x) berhasil ditambahkan ke keranjang!`, 'success');
        refreshCartBadge();
        setTimeout(() => {
          this.innerHTML = orig;
          this.classList.replace('btn-success', 'btn-primary');
          this.disabled = false;
        }, 2500);
      } catch (e) {
        this.innerHTML = orig;
        this.disabled = false;
        showAlert('Gagal menambahkan ke keranjang: ' + e.message, 'danger');
      }
    });

  } catch (e) {
    container.innerHTML = `<div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle me-2"></i>Gagal memuat detail produk: ${e.message}
      <br><a href="products.html" class="alert-link">Kembali ke daftar produk</a>
    </div>`;
  }
}

if (productId && !isNaN(productId)) {
  loadProductDetail();
}
</script>
