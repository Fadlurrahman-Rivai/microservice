<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPlace – Riwayat Transaksi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-shop-window me-2"></i>MarketPlace</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Beranda</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-grid me-1"></i>Produk</a></li>
        <li class="nav-item">
          <a class="nav-link" href="cart.html">
            <i class="bi bi-cart3 me-1"></i>Keranjang
            <span class="cart-badge" style="display:none">0</span>
          </a>
        </li>
        <li class="nav-item" id="admin-menu"><a class="nav-link" href="admin.html"><i class="bi bi-gear me-1"></i>Admin</a></li>
      </ul>
      <div class="ms-3 d-flex justify-content-end" id="user-info-container"></div>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container">

    <div id="alert-container"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="section-title mb-0">Riwayat Transaksi</h1>
      <button class="btn btn-outline-primary btn-sm" onclick="loadTransactions()">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>

    <div id="transactions-container"></div>

  </div>
</main>

<!-- Modal Detail Transaksi -->
<div class="modal fade" id="trx-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-receipt me-2"></i>Detail Transaksi</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0" id="modal-body">
        <div class="text-center py-4">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Tutup</button>
        <a href="products.html" class="btn btn-primary">
          <i class="bi bi-bag me-2"></i>Belanja Lagi
        </a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container text-center">
    <p class="mb-0 small">&copy; 2024 MarketPlace Microservices</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js?v=20260707"></script>
<script src="js/auth.js"></script>
<script>
'use strict';

const trxModal = new bootstrap.Modal(document.getElementById('trx-modal'));

async function loadTransactions() {
  const user = getCurrentUser();

  if (!user || user.role !== 'admin') {
    showAlert('Akses ditolak. Fitur transaksi hanya untuk admin.', 'danger');
    return;
  }

  const container = document.getElementById('transactions-container');
  showLoading('transactions-container', 'Memuat riwayat transaksi...');

  try {
    const data = await apiCall(
      `${API.PAYMENT}/transactions?user_id=${user.id}&user_role=${encodeURIComponent(user.role)}`
    );
    const trxs = data.data;

    if (!trxs.length) {
      container.innerHTML = `
        <div class="text-center py-5">
          <i class="bi bi-receipt display-3 text-muted"></i>
          <h4 class="mt-3 text-muted">Belum ada transaksi</h4>
          <p class="text-muted">Lakukan checkout untuk memulai transaksi pertama Anda.</p>
          <a href="products.html" class="btn btn-primary mt-2">
            <i class="bi bi-bag me-2"></i>Mulai Belanja
          </a>
        </div>`;
      return;
    }

    let html = '<div class="row g-3">';
    trxs.forEach(trx => {
      const statusClass = `badge-${trx.status}`;
      html += `
        <div class="col-12">
          <div class="card transaction-card border-0 shadow-sm" onclick="showDetail(${trx.id_transaksi})">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-sm-2 col-4 mb-2 mb-sm-0">
                  <div class="text-muted small">ID Transaksi</div>
                  <div class="fw-bold">#${trx.id_transaksi}</div>
                </div>
                <div class="col-sm-3 col-8 mb-2 mb-sm-0">
                  <div class="text-muted small">Tanggal</div>
                  <div class="fw-semibold">${formatDate(trx.tanggal)}</div>
                </div>
                <div class="col-sm-3 col-6 mb-2 mb-sm-0">
                  <div class="text-muted small">Pembeli</div>
                  <div class="fw-semibold">${trx.nama_pembeli}</div>
                </div>
                <div class="col-sm-2 col-3">
                  <span class="badge ${statusClass} px-3 py-2 fs-7 rounded-pill">${trx.status}</span>
                </div>
                <div class="col-sm-2 col-3 text-end">
                  <div class="text-muted small">Total</div>
                  <div class="fw-bold text-price">${formatCurrency(trx.total)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;

  } catch (e) {
    container.innerHTML = `
      <div class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <strong>Payment Service tidak tersedia.</strong><br>
        Riwayat transaksi tidak dapat ditampilkan karena Payment Service sedang tidak aktif.
        <br><small class="text-muted">Error: ${e.message}</small>
      </div>`;
  }
}

async function showDetail(id) {
  const user = getCurrentUser();
  if (!user || user.role !== 'admin') {
    showAlert('Akses ditolak. Fitur transaksi hanya untuk admin.', 'danger');
    return;
  }

  document.getElementById('modal-body').innerHTML =
    '<div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></div>';
  trxModal.show();

  try {
    const data = await apiCall(
      `${API.PAYMENT}/transactions/${id}?user_id=${user.id}&user_role=${encodeURIComponent(user.role)}`
    );
    const trx  = data.data;

    let itemRows = '';
    (trx.items || []).forEach(item => {
      itemRows += `
        <tr>
          <td>${item.nama_produk}</td>
          <td class="text-center">${item.jumlah}x</td>
          <td class="text-end">${formatCurrency(item.harga)}</td>
          <td class="text-end fw-semibold">${formatCurrency(item.subtotal)}</td>
        </tr>`;
    });

    const statusBadge = `badge-${trx.status}`;
    document.getElementById('modal-body').innerHTML = `
      <div class="p-2">
        <div class="row g-3 mb-4">
          <div class="col-sm-6">
            <div class="bg-light rounded-3 p-3">
              <div class="text-muted small mb-1">ID Transaksi</div>
              <div class="fw-bold fs-5">#${trx.id_transaksi}</div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="bg-light rounded-3 p-3">
              <div class="text-muted small mb-1">Status</div>
              <span class="badge ${statusBadge} fs-6 rounded-pill px-3">${trx.status}</span>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="bg-light rounded-3 p-3">
              <div class="text-muted small mb-1">Nama Pembeli</div>
              <div class="fw-semibold">${trx.nama_pembeli}</div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="bg-light rounded-3 p-3">
              <div class="text-muted small mb-1">Metode Bayar</div>
              <div class="fw-semibold">${trx.metode_bayar}</div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="bg-light rounded-3 p-3">
              <div class="text-muted small mb-1">Tanggal</div>
              <div class="fw-semibold">${formatDate(trx.tanggal)}</div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="bg-light rounded-3 p-3">
              <div class="text-muted small mb-1">Total Pembayaran</div>
              <div class="fw-bold text-price fs-5">${formatCurrency(trx.total)}</div>
            </div>
          </div>
        </div>

        <h6 class="fw-bold mb-3"><i class="bi bi-list-ul me-2"></i>Detail Item</h6>
        <div class="table-responsive">
          <table class="table table-sm table-hover">
            <thead class="table-light">
              <tr>
                <th>Produk</th>
                <th class="text-center">Qty</th>
                <th class="text-end">Harga Satuan</th>
                <th class="text-end">Subtotal</th>
              </tr>
            </thead>
            <tbody>${itemRows}</tbody>
            <tfoot class="table-light">
              <tr>
                <td colspan="3" class="text-end fw-bold">Total</td>
                <td class="text-end fw-bold text-price">${formatCurrency(trx.total)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>`;
  } catch (e) {
    document.getElementById('modal-body').innerHTML =
      `<div class="alert alert-danger">Gagal memuat detail: ${e.message}</div>`;
  }
}

loadTransactions();
</script>
</body>
</html>
