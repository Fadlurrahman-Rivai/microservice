version: '3.8'

networks:
  marketplace-network:
    driver: bridge

volumes:
  catalog-db-data:
  cart-db-data:
  inventory-db-data:
  payment-db-data:

services:

  # ─────────────────────────────────────────────────────────────────
  # DATABASE CONTAINERS
  # ─────────────────────────────────────────────────────────────────

  catalog-db:
    image: mysql:8.0
    container_name: catalog-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: catalog_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - catalog-db-data:/var/lib/mysql
      - ./database/catalog:/docker-entrypoint-initdb.d:ro
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cart-db:
    image: mysql:8.0
    container_name: cart-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: cart_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - cart-db-data:/var/lib/mysql
      - ./database/cart:/docker-entrypoint-initdb.d:ro
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  inventory-db:
    image: mysql:8.0
    container_name: inventory-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - inventory-db-data:/var/lib/mysql
      - ./database/inventory:/docker-entrypoint-initdb.d:ro
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: payment_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - payment-db-data:/var/lib/mysql
      - ./database/payment:/docker-entrypoint-initdb.d:ro
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # MICROSERVICE CONTAINERS
  # ─────────────────────────────────────────────────────────────────

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: catalog-service
    restart: unless-stopped
    environment:
      DB_HOST: catalog-db
      DB_NAME: catalog_db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
    ports:
      - "${CATALOG_PORT}:80"
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - marketplace-network

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    restart: unless-stopped
    environment:
      DB_HOST: cart-db
      DB_NAME: cart_db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
    ports:
      - "${CART_PORT}:80"
    depends_on:
      cart-db:
        condition: service_healthy
    networks:
      - marketplace-network

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    environment:
      DB_HOST: inventory-db
      DB_NAME: inventory_db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
    ports:
      - "${INVENTORY_PORT}:80"
    depends_on:
      inventory-db:
        condition: service_healthy
    networks:
      - marketplace-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    environment:
      DB_HOST: payment-db
      DB_NAME: payment_db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
    ports:
      - "${PAYMENT_PORT}:80"
    depends_on:
      payment-db:
        condition: service_healthy
    networks:
      - marketplace-network

  # ─────────────────────────────────────────────────────────────────
  # FRONTEND CONTAINER
  # ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - marketplace-network
    depends_on:
      - catalog-service
      - cart-service
      - inventory-service
      - payment-service
